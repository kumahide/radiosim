name: CI

# Minimal CI: headless checks on the non-GUI code (models / simulation /
# config / dem / batch). The tkinter GUI layer (views/*) can't run on a
# headless runner, so it is exercised only by pyright's static check, not pytest.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg   # matplotlib must not try to open a display
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pyright ruff bandit

      - name: Ruff (syntax + pyflakes)
        run: ruff check .          # config from pyproject.toml [tool.ruff]

      - name: Bandit (security static analysis)
        # 設定は pyproject.toml [tool.bandit]。-ll で Severity>=Medium のみゲート化
        # （Low はローカル Stop-hook の助言に委ね、CI は実害級だけで落とす）。
        run: bandit -r . -c pyproject.toml -ll -q

      - name: Pyright (type check, app modules)
        run: >-
          pyright
          batch.py report.py models.py simulation.py config.py dem.py version.py
          i18n.py main.py report_map.py map_graphics.py coords.py mpl_fonts.py
          views/launcher.py views/graph.py views/batch_builder.py
          views/map_window.py views/dialogs.py views/progress.py

      - name: Pytest (with coverage gate)
        run: python -m pytest --cov
