[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "--tb=short -q"
# network: 外部ネットワークへの実アクセスを許可する（既定は conftest の
# _block_network で遮断。理由は conftest.py の同節を参照）。
markers = [
    "network: 外部ネットワークアクセスを行うテスト（既定の遮断を解除する）",
]

# --- Ruff（lint）-----------------------------------------------------------
# CI の lint をここに明文化（従来は CI で `--select E9,F` をフラグ指定していた）。
# E9=構文エラー / F=pyflakes（未使用 import・未定義名）。GUI も静的検査するため
# 除外なし。CI は `ruff check .` で本設定を単一ソースとして使う。
[tool.ruff]
# 下限はピン留め numpy 2.4 の Requires-Python(>=3.11) に合わせる（README と同期）。
target-version = "py311"

[tool.ruff.lint]
select = ["E9", "F"]

# --- Bandit（セキュリティ静的解析）----------------------------------------
# 設定をここに明文化（CI 化は低優先で別途）。テストとビルド生成物は対象外。
# B101(assert) はテスト方針上許容、B404/B603(subprocess) はビルド補助で意図的。
[tool.bandit]
exclude_dirs = ["tests", "build", "dist", ".venv"]
skips = ["B101"]

[tool.coverage.run]
# ヘッドレス層全体をゲート対象にする（= Web/PWA で再利用予定の資産。
# 従来はコア3モジュールのみで、report/batch の出力層が死角だった）。
source = [
    "models", "simulation", "config", "dem",
    "batch", "report", "report_map",
    "coords", "map_graphics", "mpl_fonts", "i18n",
]
omit   = ["views/*", "main.py"]   # GUI層（tkinter）はカバレッジ対象外

[tool.coverage.report]
show_missing = true
# CI gate: the headless layer must stay tested. Floor is set below the
# current figure so routine changes don't trip, but a real drop in
# coverage fails the build. Raise as coverage improves.
fail_under = 85
